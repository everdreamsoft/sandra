<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandra ERP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3348;
  --text:#e4e6f0;--text2:#8b8fa8;--accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00b894;--orange:#fdcb6e;--red:#e17055;--blue:#74b9ff;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.3);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
a{color:var(--accent2);text-decoration:none}

/* Sidebar */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10}
.sidebar-brand{padding:0 24px 24px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar-brand h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.sidebar-brand h1 span{color:var(--accent2)}
.sidebar-brand p{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.nav-section{padding:16px 12px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 24px;cursor:pointer;transition:all .15s;font-size:14px;color:var(--text2);border-left:3px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(108,92,231,.1);color:var(--accent2);border-left-color:var(--accent)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--surface2);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.nav-item.active .nav-badge{background:rgba(108,92,231,.2);color:var(--accent2)}

/* Main */
.main{margin-left:260px;flex:1;padding:32px;min-height:100vh}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-header h2{font-size:26px;font-weight:700;letter-spacing:-.5px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;width:320px}
.search-box input{background:none;border:none;color:var(--text);font-size:14px;outline:none;width:100%}
.search-box svg{color:var(--text2);width:16px;height:16px;flex-shrink:0}

/* Cards grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card .label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.stat-card .value{font-size:32px;font-weight:700}
.stat-card .sub{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card.accent .value{color:var(--accent2)}
.stat-card.green .value{color:var(--green)}
.stat-card.orange .value{color:var(--orange)}
.stat-card.blue .value{color:var(--blue)}

/* Table */
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-header h3{font-size:16px;font-weight:600}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red);color:white}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:12px 20px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);background:var(--surface2)}
tbody td{padding:14px 20px;font-size:14px;border-bottom:1px solid var(--border)}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}

/* Status badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-active,.badge-paid,.badge-delivered{background:rgba(0,184,148,.15);color:var(--green)}
.badge-pending,.badge-draft{background:rgba(253,203,110,.15);color:var(--orange)}
.badge-processing{background:rgba(116,185,255,.15);color:var(--blue)}
.badge-overdue,.badge-cancelled{background:rgba(225,112,85,.15);color:var(--red)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:18px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:80px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid var(--border)}

/* Detail panel */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:16px}
.detail-item .label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-item .value{font-size:15px;font-weight:500}

.rel-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.rel-section h4{font-size:14px;color:var(--text2);margin-bottom:12px}
.rel-chips{display:flex;flex-wrap:wrap;gap:8px}
.rel-chip{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;transition:all .15s}
.rel-chip:hover{border-color:var(--accent);background:rgba(108,92,231,.1)}
.rel-chip .verb{color:var(--accent2);font-weight:600;margin-right:6px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:white;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;transform:translateY(100px);opacity:0;transition:all .3s;z-index:200}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.4}
.empty p{font-size:15px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .sidebar{width:60px;padding:16px 0}
  .sidebar-brand h1 span,.sidebar-brand p,.nav-section,.nav-item span,.nav-badge{display:none}
  .sidebar-brand{padding:0 12px 16px}
  .nav-item{padding:10px;justify-content:center}
  .main{margin-left:60px;padding:20px}
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-brand">
    <h1>Sandra <span>ERP</span></h1>
    <p>Mini ERP System</p>
  </div>
  <div class="nav-section">Principal</div>
  <div class="nav-item active" data-page="dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Tableau de bord</span>
  </div>
  <div class="nav-section">Gestion</div>
  <div class="nav-item" data-page="client">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    <span>Clients</span>
    <span class="nav-badge" id="badge-client">-</span>
  </div>
  <div class="nav-item" data-page="product">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    <span>Produits</span>
    <span class="nav-badge" id="badge-product">-</span>
  </div>
  <div class="nav-item" data-page="order">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    <span>Commandes</span>
    <span class="nav-badge" id="badge-order">-</span>
  </div>
  <div class="nav-item" data-page="invoice">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span>Factures</span>
    <span class="nav-badge" id="badge-invoice">-</span>
  </div>
</nav>

<main class="main" id="content"></main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Nouveau</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="modal-save">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'api.php';
let currentPage = 'dashboard';
let dashboardData = null;

const factoryConfig = {
  client: {
    label: 'Clients', singular: 'Client',
    fields: [
      {key:'name',label:'Nom',required:true},
      {key:'email',label:'Email',type:'email'},
      {key:'phone',label:'Telephone'},
      {key:'company',label:'Entreprise'},
      {key:'address',label:'Adresse',type:'textarea'},
      {key:'status',label:'Statut',type:'select',options:['active','inactive']}
    ],
    columns: ['name','email','phone','status']
  },
  product: {
    label: 'Produits', singular: 'Produit',
    fields: [
      {key:'name',label:'Nom',required:true},
      {key:'sku',label:'SKU'},
      {key:'description',label:'Description',type:'textarea'},
      {key:'price',label:'Prix',type:'number'},
      {key:'stock',label:'Stock',type:'number'},
      {key:'category',label:'Categorie'}
    ],
    columns: ['name','sku','price','stock','category']
  },
  order: {
    label: 'Commandes', singular: 'Commande',
    fields: [
      {key:'order_number',label:'N Commande',required:true},
      {key:'date',label:'Date',type:'date'},
      {key:'status',label:'Statut',type:'select',options:['pending','processing','delivered','cancelled']},
      {key:'total',label:'Total',type:'number'},
      {key:'notes',label:'Notes',type:'textarea'}
    ],
    columns: ['order_number','date','status','total']
  },
  invoice: {
    label: 'Factures', singular: 'Facture',
    fields: [
      {key:'invoice_number',label:'N Facture',required:true},
      {key:'date',label:'Date',type:'date'},
      {key:'due_date',label:'Echeance',type:'date'},
      {key:'status',label:'Statut',type:'select',options:['draft','pending','paid','overdue']},
      {key:'total',label:'Total',type:'number'},
      {key:'tax_rate',label:'TVA %',type:'number'}
    ],
    columns: ['invoice_number','date','due_date','status','total']
  }
};

// Navigation
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentPage = item.dataset.page;
    if (currentPage === 'dashboard') renderDashboard();
    else renderList(currentPage);
  });
});

// API helper
async function api(action, params = {}) {
  const url = new URL(API, location.href);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => { if(v !== undefined) url.searchParams.set(k,v); });
  const res = await fetch(url);
  if (!res.ok) throw new Error((await res.json()).error || 'API Error');
  return res.json();
}
async function apiPost(action, params = {}, body = {}) {
  const url = new URL(API, location.href);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => { if(v !== undefined) url.searchParams.set(k,v); });
  const res = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!res.ok) throw new Error((await res.json()).error || 'API Error');
  return res.json();
}

function toast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

function fmt(v) { return v ?? '-'; }
function fmtMoney(v) { return v ? parseFloat(v).toLocaleString('fr-FR', {style:'currency',currency:'EUR'}) : '-'; }

function statusBadge(status) {
  if (!status) return '-';
  return `<span class="badge badge-${status}">${status}</span>`;
}

// Dashboard
async function renderDashboard() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    dashboardData = await api('dashboard');
    const d = dashboardData;

    const clientCount = d.client?.count ?? 0;
    const productCount = d.product?.count ?? 0;
    const orderCount = d.order?.count ?? 0;
    const invoiceCount = d.invoice?.count ?? 0;

    document.getElementById('badge-client').textContent = clientCount;
    document.getElementById('badge-product').textContent = productCount;
    document.getElementById('badge-order').textContent = orderCount;
    document.getElementById('badge-invoice').textContent = invoiceCount;

    const orderTotal = d.order?.totalAmount ?? 0;
    const invoiceTotal = d.invoice?.totalAmount ?? 0;
    const inventoryValue = d.product?.inventoryValue ?? 0;
    const totalStock = d.product?.totalStock ?? 0;

    const orderStatuses = d.order?.byStatus ?? {};
    const invoiceStatuses = d.invoice?.byStatus ?? {};

    el.innerHTML = `
      <div class="page-header">
        <h2>Tableau de bord</h2>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input placeholder="Recherche globale..." id="global-search" onkeydown="if(event.key==='Enter')globalSearch(this.value)">
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card accent">
          <div class="label">Clients</div>
          <div class="value">${clientCount}</div>
          <div class="sub">clients enregistres</div>
        </div>
        <div class="stat-card blue">
          <div class="label">Produits</div>
          <div class="value">${productCount}</div>
          <div class="sub">${totalStock} unites en stock</div>
        </div>
        <div class="stat-card green">
          <div class="label">Commandes</div>
          <div class="value">${fmtMoney(orderTotal)}</div>
          <div class="sub">${orderCount} commandes au total</div>
        </div>
        <div class="stat-card orange">
          <div class="label">Factures</div>
          <div class="value">${fmtMoney(invoiceTotal)}</div>
          <div class="sub">${invoiceCount} factures emises</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Valeur inventaire</div>
          <div class="value" style="font-size:24px">${fmtMoney(inventoryValue)}</div>
        </div>
        <div class="stat-card">
          <div class="label">Commandes par statut</div>
          <div style="margin-top:12px">
            ${Object.entries(orderStatuses).map(([s,c]) => `<div style="display:flex;justify-content:space-between;margin-bottom:6px">${statusBadge(s)} <strong>${c}</strong></div>`).join('')}
          </div>
        </div>
        <div class="stat-card">
          <div class="label">Factures par statut</div>
          <div style="margin-top:12px">
            ${Object.entries(invoiceStatuses).map(([s,c]) => `<div style="display:flex;justify-content:space-between;margin-bottom:6px">${statusBadge(s)} <strong>${c}</strong></div>`).join('')}
          </div>
        </div>
      </div>

      <div id="search-results"></div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="empty"><p>Erreur: ${e.message}</p></div>`;
  }
}

async function globalSearch(q) {
  if (!q.trim()) { document.getElementById('search-results').innerHTML = ''; return; }
  const res = await api('search', {q});
  const el = document.getElementById('search-results');
  if (!res.items.length) {
    el.innerHTML = '<div class="empty"><p>Aucun resultat</p></div>';
    return;
  }
  el.innerHTML = `
    <div class="table-container">
      <div class="table-header"><h3>Resultats pour "${q}"</h3></div>
      <table><thead><tr><th>Type</th><th>ID</th><th>Nom</th><th>Details</th></tr></thead><tbody>
        ${res.items.map(item => `<tr style="cursor:pointer" onclick="navigateToEntity('${item._factory}',${item.id})">
          <td><span class="badge badge-processing">${item._factory}</span></td>
          <td>#${item.id}</td>
          <td>${fmt(item.refs.name || item.refs.order_number || item.refs.invoice_number)}</td>
          <td style="color:var(--text2);font-size:12px">${Object.entries(item.refs).slice(0,3).map(([k,v])=>`${k}: ${v}`).join(' | ')}</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `;
}

function navigateToEntity(factory, id) {
  document.querySelectorAll('.nav-item').forEach(i => {
    i.classList.toggle('active', i.dataset.page === factory);
  });
  currentPage = factory;
  renderDetail(factory, id);
}

// List view
async function renderList(factory) {
  const config = factoryConfig[factory];
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const data = await api('list', {factory});
    const items = data.items || [];

    document.getElementById(`badge-${factory}`).textContent = items.length;

    el.innerHTML = `
      <div class="page-header">
        <h2>${config.label}</h2>
        <button class="btn btn-primary" onclick="openCreateModal('${factory}')">+ Nouveau ${config.singular}</button>
      </div>
      <div class="table-container">
        <div class="table-header">
          <h3>${items.length} ${config.label.toLowerCase()}</h3>
          <div class="search-box" style="width:240px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input placeholder="Filtrer..." oninput="filterTable(this.value)">
          </div>
        </div>
        <table>
          <thead><tr>
            <th>ID</th>
            ${config.columns.map(c => `<th>${config.fields.find(f=>f.key===c)?.label||c}</th>`).join('')}
            <th>Actions</th>
          </tr></thead>
          <tbody id="table-body">
            ${items.map(item => renderRow(factory, item, config)).join('')}
          </tbody>
        </table>
        ${items.length === 0 ? '<div class="empty"><p>Aucun element</p></div>' : ''}
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="empty"><p>Erreur: ${e.message}</p></div>`;
  }
}

function renderRow(factory, item, config) {
  return `<tr class="data-row" style="cursor:pointer" onclick="renderDetail('${factory}',${item.id})">
    <td style="color:var(--text2)">#${item.id}</td>
    ${config.columns.map(c => {
      const v = item.refs[c];
      if (c === 'status') return `<td>${statusBadge(v)}</td>`;
      if (c === 'price' || c === 'total') return `<td>${fmtMoney(v)}</td>`;
      if (c === 'stock') return `<td><strong>${v ?? 0}</strong></td>`;
      return `<td>${fmt(v)}</td>`;
    }).join('')}
    <td>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditModal('${factory}',${item.id},${JSON.stringify(item.refs).replace(/"/g,'&quot;')})">Modifier</button>
    </td>
  </tr>`;
}

function filterTable(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.data-row').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// Detail view
async function renderDetail(factory, id) {
  const config = factoryConfig[factory];
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const item = await api('get', {factory, id});

    const refsHtml = config.fields.map(f => {
      let val = item.refs[f.key];
      if (f.key === 'status') val = statusBadge(val);
      else if (f.type === 'number' && (f.key === 'price' || f.key === 'total')) val = fmtMoney(val);
      else val = fmt(val);
      return `<div class="detail-item"><div class="label">${f.label}</div><div class="value">${val}</div></div>`;
    }).join('');

    const rels = item.relationships || [];
    const meaningfulRels = rels.filter(r =>
      r.verb_name && !['is_a','contained_in_file'].includes(r.verb_name) && r.verb_name !== 'autoaliasargs'
    );

    const relsHtml = meaningfulRels.length ? `
      <div class="rel-section">
        <h4>Relations (${meaningfulRels.length})</h4>
        <div class="rel-chips">
          ${meaningfulRels.map(r => `<div class="rel-chip" onclick="resolveRelation(${r.idConceptTarget})">
            <span class="verb">${r.verb_name}</span> ${r.target_name || '#'+r.idConceptTarget}
          </div>`).join('')}
        </div>
      </div>
    ` : '';

    el.innerHTML = `
      <div class="page-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="btn btn-ghost" onclick="renderList('${factory}')">&larr; Retour</button>
          <h2>${config.singular} #${id}</h2>
        </div>
        <button class="btn btn-primary" onclick="openEditModal('${factory}',${id},${JSON.stringify(item.refs).replace(/"/g,'&quot;')})">Modifier</button>
      </div>
      <div class="detail-panel">
        <div class="detail-grid">${refsHtml}</div>
        ${relsHtml}
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="empty"><p>Erreur: ${e.message}</p></div>`;
  }
}

async function resolveRelation(targetId) {
  try {
    const factories = await api('factories');
    for (const f of factories) {
      try {
        const item = await api('get', {factory: f.name, id: targetId});
        if (item && item.id) {
          navigateToEntity(f.name, targetId);
          return;
        }
      } catch(e) { /* not in this factory */ }
    }
    toast('Entite cible non trouvee', true);
  } catch(e) {
    toast('Erreur: ' + e.message, true);
  }
}

// Modals
function openCreateModal(factory) {
  const config = factoryConfig[factory];
  document.getElementById('modal-title').textContent = `Nouveau ${config.singular}`;
  document.getElementById('modal-body').innerHTML = config.fields.map(f => fieldHtml(f, '')).join('');
  document.getElementById('modal-save').onclick = () => saveEntity(factory);
  document.getElementById('modal').classList.add('show');
}

function openEditModal(factory, id, refs) {
  const config = factoryConfig[factory];
  document.getElementById('modal-title').textContent = `Modifier ${config.singular} #${id}`;
  document.getElementById('modal-body').innerHTML = config.fields.map(f => fieldHtml(f, refs[f.key] || '')).join('');
  document.getElementById('modal-save').onclick = () => updateEntity(factory, id);
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function fieldHtml(field, value) {
  if (field.type === 'textarea') {
    return `<div class="form-group"><label>${field.label}</label><textarea data-key="${field.key}">${value}</textarea></div>`;
  }
  if (field.type === 'select') {
    return `<div class="form-group"><label>${field.label}</label><select data-key="${field.key}">
      ${field.options.map(o => `<option value="${o}" ${o===value?'selected':''}>${o}</option>`).join('')}
    </select></div>`;
  }
  const type = field.type || 'text';
  const step = type === 'number' ? ' step="0.01"' : '';
  return `<div class="form-group"><label>${field.label}${field.required?' *':''}</label><input type="${type}" data-key="${field.key}" value="${value}"${step}></div>`;
}

async function saveEntity(factory) {
  const refs = {};
  document.querySelectorAll('#modal-body [data-key]').forEach(el => {
    refs[el.dataset.key] = el.value;
  });
  try {
    await apiPost('create', {factory}, {refs});
    closeModal();
    toast(`${factoryConfig[factory].singular} cree avec succes`);
    renderList(factory);
  } catch(e) {
    toast('Erreur: ' + e.message, true);
  }
}

async function updateEntity(factory, id) {
  const refs = {};
  document.querySelectorAll('#modal-body [data-key]').forEach(el => {
    refs[el.dataset.key] = el.value;
  });
  try {
    await apiPost('update', {factory, id}, {refs});
    closeModal();
    toast(`${factoryConfig[factory].singular} mis a jour`);
    renderDetail(factory, id);
  } catch(e) {
    toast('Erreur: ' + e.message, true);
  }
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Boot
renderDashboard();
</script>
</body>
</html>
